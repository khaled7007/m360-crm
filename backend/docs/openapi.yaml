  /reports/par:
    get:
      tags: [Reports]
      summary: Get portfolio at risk analysis
      description: Delinquency breakdown and portfolio at risk ratios. Requires manager or admin role.
      responses:
        '200':
          description: Portfolio at risk data
          content:
            application/json:
              schema:
                type: object
                description: Portfolio at risk analysis with delinquency breakdown
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/login or /auth/refresh

  parameters:
    IDParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SearchParam:
      name: search
      in: query
      description: Search term
      schema:
        type: string
    LimitParam:
      name: limit
      in: query
      description: Number of items per page (default 20)
      schema:
        type: integer
        default: 20
    OffsetParam:
      name: offset
      in: query
      description: Number of items to skip
      schema:
        type: integer
        default: 0

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized - missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden - insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ── Common ──
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message

    MessageResponse:
      type: object
      properties:
        message:
          type: string

    # ── Auth ──
    Role:
      type: string
      enum: [admin, manager, loan_officer, credit_analyst, compliance_officer, collections_officer, data_entry]

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name_en:
          type: string
        name_ar:
          type: string
        role:
          $ref: '#/components/schemas/Role'
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    TokenResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT access token
        refresh_token:
          type: string
          description: Refresh token
        user:
          $ref: '#/components/schemas/User'

    CreateUserRequest:
      type: object
      required: [email, password, name_en, role]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name_en:
          type: string
        name_ar:
          type: string
        role:
          $ref: '#/components/schemas/Role'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, new_password]
      properties:
        token:
          type: string
        new_password:
          type: string
          minLength: 8

    # ── Organization ──
    Organization:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name_en:
          type: string
        name_ar:
          type: string
        cr_number:
          type: string
          nullable: true
        cr_verified:
          type: boolean
        tax_id:
          type: string
          nullable: true
        industry:
          type: string
          nullable: true
        legal_structure:
          type: string
          nullable: true
        founding_date:
          type: string
          format: date-time
          nullable: true
        address_en:
          type: string
          nullable: true
        address_ar:
          type: string
          nullable: true
        city:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        assigned_officer_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrganizationCreateRequest:
      type: object
      required: [name_en]
      properties:
        name_en:
          type: string
        name_ar:
          type: string
        cr_number:
          type: string
        tax_id:
          type: string
        industry:
          type: string
        legal_structure:
          type: string
        address_en:
          type: string
        address_ar:
          type: string
        city:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string

    OrganizationUpdateRequest:
      type: object
      properties:
        name_en:
          type: string
        name_ar:
          type: string
        cr_number:
          type: string
        tax_id:
          type: string
        industry:
          type: string
        legal_structure:
          type: string
        address_en:
          type: string
        address_ar:
          type: string
        city:
          type: string
        phone:
          type: string
        email:
          type: string
        website:
          type: string

    OrganizationListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Organization'
        total:
          type: integer

    # ── Contact ──
    Contact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name_en:
          type: string
        name_ar:
          type: string
        national_id:
          type: string
          nullable: true
        role:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        nafath_verified:
          type: boolean
        simah_score:
          type: integer
          nullable: true
        is_guarantor:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ContactCreateRequest:
      type: object
      required: [organization_id, name_en]
      properties:
        organization_id:
          type: string
          format: uuid
        name_en:
          type: string
        name_ar:
          type: string
        national_id:
          type: string
        role:
          type: string
        phone:
          type: string
        email:
          type: string
        is_guarantor:
          type: boolean

    ContactUpdateRequest:
      type: object
      properties:
        name_en:
          type: string
        name_ar:
          type: string
        national_id:
          type: string
        role:
          type: string
        phone:
          type: string
        email:
          type: string
        is_guarantor:
          type: boolean

    # ── Lead ──
    LeadStatus:
      type: string
      enum: [new, contacted, qualified, unqualified, converted]

    Lead:
      type: object
      properties:
        id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
          nullable: true
        contact_name:
          type: string
        contact_phone:
          type: string
          nullable: true
        contact_email:
          type: string
          nullable: true
        company_name:
          type: string
          nullable: true
        source:
          type: string
        status:
          $ref: '#/components/schemas/LeadStatus'
        estimated_amount:
          type: number
          format: double
          nullable: true
        notes:
          type: string
          nullable: true
        assigned_officer_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    LeadCreateRequest:
      type: object
      required: [contact_name, source]
      properties:
        contact_name:
          type: string
        contact_phone:
          type: string
        contact_email:
          type: string
        company_name:
          type: string
