        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  # ──────────────────────────────────────────────
  # Documents
  # ──────────────────────────────────────────────
  /documents:
    post:
      tags: [Documents]
      summary: Upload a document
      description: |
        Upload a file (max 10MB). Allowed types: PDF, JPEG, PNG, DOC, DOCX, XLS, XLSX.
        Uses multipart/form-data with fields: file, entity_type, entity_id, name, category (optional).
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, entity_type, entity_id, name]
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload (max 10MB)
                entity_type:
                  type: string
                  description: Type of entity the document belongs to (e.g. application, organization)
                entity_id:
                  type: string
                  format: uuid
                  description: ID of the entity
                name:
                  type: string
                  description: Document name
                category:
                  type: string
                  description: Document category (optional)
      responses:
        '201':
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /documents/{id}:
    get:
      tags: [Documents]
      summary: Get document by ID
      parameters:
        - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: Document details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Documents]
      summary: Delete a document
      description: Requires admin or manager role.
      parameters:
        - $ref: '#/components/parameters/IDParam'
      responses:
        '200':
          description: Document deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /documents/entity/{type}/{id}:
    get:
