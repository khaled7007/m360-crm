        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /integrations/bayan/{cr_number}:
    get:
      tags: [Integrations]
      summary: Get Bayan commercial credit report
      description: Retrieves business credit score, risk level, capital, years in business, and employee count.
      parameters:
        - name: cr_number
          in: path
          required: true
          schema:
            type: string
          description: Commercial Registration number
      responses:
        '200':
          description: Bayan business credit report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BayanCreditReport'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
