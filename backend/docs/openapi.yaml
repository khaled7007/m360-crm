      parameters:
        - name: national_id
          in: path
          required: true
          schema:
            type: string
          description: Saudi National ID
      responses:
        '200':
          description: Yaqeen person information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/YaqeenIdentityInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /integrations/watheq/{cr_number}:
    get:
      tags: [Integrations]
      summary: Verify CR through Watheq
      description: Verifies Commercial Registration status, entity type, activities, and capital.
      parameters:
        - name: cr_number
          in: path
          required: true
          schema:
            type: string
          description: Commercial Registration number
      responses:
        '200':
          description: Watheq CR verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WatheqCRInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
