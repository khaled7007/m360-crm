      responses:
        '200':
          description: Nafath identity verification result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NafathIdentityInfo'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
