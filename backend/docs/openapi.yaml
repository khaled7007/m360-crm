  # ──────────────────────────────────────────────
  # Reports
  # ──────────────────────────────────────────────
  /reports/dashboard:
    get:
      tags: [Reports]
      summary: Get dashboard statistics
      description: Overall statistics including leads, applications, facilities, disbursed amounts, and PAR metrics.
      responses:
        '200':
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /reports/pipeline:
    get:
      tags: [Reports]
      summary: Get pipeline statistics
      description: Application pipeline funnel showing count per workflow status.
      responses:
        '200':
          description: Pipeline statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PipelineStats'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /reports/officers:
    get:
      tags: [Reports]
      summary: Get officer performance
      description: Performance metrics for loan officers. Requires manager or admin role.
      responses:
        '200':
          description: Officer performance list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OfficerPerformance'
